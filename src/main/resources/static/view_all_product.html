<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Products</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f8fafc;
    margin: 0;
}

.container {
    padding: 30px;
}

button {
    padding: 10px 15px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 8px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

img {
    width: 60px;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
    <h2>All Products</h2>
    <button onclick="loadProducts()">Load Products</button>

    <div id="table"></div>
</div>

<script>
async function loadProducts() {
    const res = await fetch("/viewAllProducts");
    const data = await res.json();

    let rows = "";
    data.forEach(p => {
        rows += `
        <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.price}</td>
            <td><img src="${p.photoUrl}" /></td>
        </tr>`;
    });

    table.innerHTML = `
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Image</th>
        </tr>
        ${rows}
    </table>`;
}
</script>

</body>
</html>
